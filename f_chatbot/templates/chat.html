<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Woodsy Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
  :root{
    --cream:#f5f0e8;
    --oak:#c8a86b;
    --oak-dark:#a8883b;
    --walnut:#5c3d2e;
    --charcoal:#1e1a16;
    --charcoal-2:#252017;
    --charcoal-3:#2e2820;
    --smoke:#8c7b6b;
    --smoke-light:#b0a090;
    --green:#4caf79;
    --amber:#e8a44a;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;}
  body{
    background:var(--charcoal);
    color:var(--cream);
    font-family:'Cormorant Garamond',serif;
    display:grid;
    grid-template-rows:auto 1fr auto;
    height:100vh;
  }

  /* ── Header ── */
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:.9rem 1.8rem;
    border-bottom:1px solid rgba(200,168,107,.15);
    background:var(--charcoal-2);
  }
  .logo{font-size:1.4rem;font-weight:300;letter-spacing:.05em;}
  .logo em{color:var(--oak);font-style:italic;}

  .header-right{display:flex;align-items:center;gap:1.2rem;}

  /* Connection status */
  .ws-status{
    font-family:'DM Mono',monospace;
    font-size:.6rem;
    letter-spacing:.12em;
    text-transform:uppercase;
    display:flex;align-items:center;gap:.5rem;
    color:var(--smoke);
  }
  .ws-dot{width:6px;height:6px;border-radius:50%;background:#555;transition:background .4s;}
  .ws-dot.connected{background:var(--green);animation:pulse 2s infinite;}
  .ws-dot.connecting{background:var(--amber);animation:pulse .6s infinite;}
  .ws-dot.disconnected{background:#e05555;}

  /* Pipeline source indicator */
  .pipeline-pill{
    font-family:'DM Mono',monospace;
    font-size:.58rem;
    letter-spacing:.12em;
    text-transform:uppercase;
    padding:.25rem .7rem;
    border-radius:20px;
    border:1px solid transparent;
    opacity:0;
    transition:opacity .4s ease;
  }
  .pipeline-pill.visible{opacity:1;}
  .pipeline-pill.cache{
    color:var(--amber);
    border-color:rgba(232,164,74,.4);
    background:rgba(232,164,74,.08);
  }
  .pipeline-pill.rag{
    color:var(--green);
    border-color:rgba(76,175,121,.4);
    background:rgba(76,175,121,.08);
  }

  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

  /* ── Messages ── */
  #messages{
    overflow-y:auto;
    padding:1.8rem 1.5rem;
    display:flex;
    flex-direction:column;
    gap:1.4rem;
    scroll-behavior:smooth;
  }
  #messages::-webkit-scrollbar{width:4px;}
  #messages::-webkit-scrollbar-thumb{background:rgba(200,168,107,.2);border-radius:2px;}

  .msg{
    display:flex;
    gap:1rem;
    max-width:800px;
    animation:fadeIn .35s ease both;
  }
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .msg.user{align-self:flex-end;flex-direction:row-reverse;}
  .msg.assistant{align-self:flex-start;}

  .avatar{
    width:32px;height:32px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:.8rem;flex-shrink:0;margin-top:3px;
    font-family:'DM Mono',monospace;letter-spacing:0;
  }
  .msg.user .avatar{background:var(--walnut);color:var(--cream);}
  .msg.assistant .avatar{
    background:linear-gradient(135deg,var(--oak-dark),var(--oak));
    color:var(--charcoal);font-weight:700;
  }

  .msg-body{display:flex;flex-direction:column;gap:.5rem;min-width:0;}

  /* Source tag on each assistant message */
  .msg-source-tag{
    font-family:'DM Mono',monospace;
    font-size:.55rem;
    letter-spacing:.12em;
    text-transform:uppercase;
    display:inline-flex;align-items:center;gap:.35rem;
    padding:.18rem .6rem;
    border-radius:3px;
    align-self:flex-start;
  }
  .msg-source-tag.cache{
    color:var(--amber);
    background:rgba(232,164,74,.1);
    border:1px solid rgba(232,164,74,.3);
  }
  .msg-source-tag.rag{
    color:var(--green);
    background:rgba(76,175,121,.1);
    border:1px solid rgba(76,175,121,.3);
  }
  .msg-source-tag svg{width:9px;height:9px;}

  .bubble{
    background:var(--charcoal-3);
    border:1px solid rgba(200,168,107,.12);
    border-radius:4px;
    padding:.85rem 1.15rem;
    font-size:1.05rem;
    line-height:1.7;
    font-weight:300;
  }
  .msg.user .bubble{background:var(--walnut);border-color:transparent;}
  .bubble ul,.bubble ol{margin-left:1.3rem;margin-top:.3rem;}
  .bubble li{margin-bottom:.2rem;}

  /* Sources panel */
  .sources-panel{
    padding:.55rem .9rem;
    background:rgba(200,168,107,.05);
    border-left:2px solid rgba(200,168,107,.35);
    font-family:'DM Mono',monospace;
    font-size:.6rem;
    color:var(--smoke-light);
    letter-spacing:.04em;
    line-height:1.6;
  }
  .sources-panel strong{color:var(--oak);display:block;margin-bottom:.3rem;text-transform:uppercase;font-size:.58rem;}

  /* Audio controls */
  .audio-row{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.1rem;}
  .play-btn{
    background:none;border:1px solid rgba(200,168,107,.25);
    color:var(--oak);font-family:'DM Mono',monospace;
    font-size:.58rem;padding:.28rem .65rem;letter-spacing:.08em;
    cursor:pointer;border-radius:2px;transition:all .2s;
  }
  .play-btn:hover{background:rgba(200,168,107,.1);}

  /* Typing dots */
  .typing-bubble{display:flex;gap:5px;align-items:center;padding:.75rem 1.15rem;}
  .tdot{
    width:5px;height:5px;border-radius:50%;background:var(--oak);
    animation:tdot .8s infinite;
  }
  .tdot:nth-child(2){animation-delay:.15s;}
  .tdot:nth-child(3){animation-delay:.3s;}
  @keyframes tdot{0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-5px);}}

  /* ── Input bar ── */
  #input-area{
    border-top:1px solid rgba(200,168,107,.15);
    background:var(--charcoal-2);
    padding:.9rem 1.5rem;
    display:flex;gap:.75rem;align-items:flex-end;
  }
  #user-input{
    flex:1;background:var(--charcoal-3);
    border:1px solid rgba(200,168,107,.2);color:var(--cream);
    font-family:'Cormorant Garamond',serif;font-size:1.05rem;
    padding:.65rem 1rem;resize:none;outline:none;border-radius:3px;
    min-height:42px;max-height:110px;line-height:1.5;transition:border-color .2s;
  }
  #user-input:focus{border-color:rgba(200,168,107,.5);}
  #user-input::placeholder{color:var(--smoke);font-style:italic;}
  #send-btn{
    background:var(--oak);border:none;color:var(--charcoal);
    font-family:'DM Mono',monospace;font-size:.63rem;letter-spacing:.15em;
    text-transform:uppercase;padding:.65rem 1.3rem;cursor:pointer;
    border-radius:3px;transition:background .2s;height:42px;flex-shrink:0;
  }
  #send-btn:hover{background:var(--oak-dark);}
  #send-btn:disabled{opacity:.38;cursor:not-allowed;}

  /* Error toast */
  #ws-error{
    display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
    background:#c0392b;color:#fff;font-family:'DM Mono',monospace;font-size:.65rem;
    letter-spacing:.08em;padding:.5rem 1.2rem;border-radius:3px;z-index:100;
  }
</style>
</head>
<body>

<header>
  <div class="logo">Wood<em>sy</em></div>
  <div class="header-right">
    <div class="pipeline-pill" id="pipeline-pill"></div>
    <div class="ws-status">
      <span class="ws-dot connecting" id="ws-dot"></span>
      <span id="ws-label">Connecting…</span>
    </div>
  </div>
</header>

<div id="messages">
  <div class="msg assistant">
    <div class="avatar">W</div>
    <div class="msg-body">
      <div class="bubble">Hello! I'm Woodsy, your furniture advisor. Ask me about our collection — materials, dimensions, care guides, or warranty policies.</div>
    </div>
  </div>
</div>

<div id="input-area">
  <textarea id="user-input" rows="1" placeholder="Ask about sofas, wood types, delivery…"></textarea>
  <button id="send-btn" disabled>Send</button>
</div>

<div id="ws-error">Connection lost. Reconnecting…</div>

<script>
  const SESSION_ID = "{{ session_id }}";
  const messagesEl  = document.getElementById('messages');
  const inputEl     = document.getElementById('user-input');
  const sendBtn     = document.getElementById('send-btn');
  const wsDot       = document.getElementById('ws-dot');
  const wsLabel     = document.getElementById('ws-label');
  const pipelinePill = document.getElementById('pipeline-pill');
  const wsError     = document.getElementById('ws-error');

  // ── State ─────────────────────────────────────────────────────────────────
  let ws = null;
  let reconnectTimer = null;
  let currentMsgBody  = null;   // .msg-body of the active assistant message
  let currentBubble   = null;   // .bubble div being streamed into
  let tokenBuffer     = '';
  let currentAudioRow = null;
  let audioBlobCount  = 0;
  let pendingSource   = null;   // "cache" | "rag" — set on pipeline_source event

  // ── WebSocket ─────────────────────────────────────────────────────────────
  function buildWsUrl() {
    // Use wss:// on HTTPS pages, ws:// on HTTP
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    return `${proto}://${location.host}/ws/chat/`;
  }

  function setStatus(state) {
    wsDot.className = 'ws-dot ' + state;
    wsLabel.textContent = {
      connected:    'Connected',
      connecting:   'Connecting…',
      disconnected: 'Disconnected',
    }[state] || state;
  }

  function connect() {
    if (ws && ws.readyState <= 1) return; // already open or connecting
    setStatus('connecting');
    ws = new WebSocket(buildWsUrl());
    ws.binaryType = 'arraybuffer';

    ws.onopen = () => {
      setStatus('connected');
      sendBtn.disabled = false;
      wsError.style.display = 'none';
      clearTimeout(reconnectTimer);
    };

    ws.onclose = () => {
      setStatus('disconnected');
      sendBtn.disabled = true;
      wsError.style.display = 'block';
      // Auto-reconnect after 3 s
      reconnectTimer = setTimeout(connect, 3000);
    };

    ws.onerror = () => {
      ws.close();
    };

    ws.onmessage = handleMessage;
  }

  // ── Message handler ───────────────────────────────────────────────────────
  function handleMessage(event) {
    // Binary = audio blob
    if (event.data instanceof ArrayBuffer) {
      const blob = new Blob([event.data], { type: 'audio/mpeg' });
      audioBlobCount++;
      addAudioButton(blob, audioBlobCount);
      return;
    }

    const msg = JSON.parse(event.data);

    // ① pipeline_source — first event, tells us cache vs rag
    if (msg.type === 'pipeline_source') {
      pendingSource = msg.source;
      showPipelinePill(msg.source);
      return;
    }

    // ② cache_hit — full response in one shot
    if (msg.type === 'cache_hit') {
      removeTyping();
      const { body, bubble } = createAssistantMessage(pendingSource || 'cache');
      currentMsgBody = body;
      currentBubble  = bubble;
      tokenBuffer    = msg.text;
      bubble.textContent = msg.text;
      return;
    }

    // ③ metadata — retrieved sources
    if (msg.type === 'metadata') {
      if (msg.sources && msg.sources.length) {
        // If we already have a message body, append there; otherwise queue
        const target = currentMsgBody || _pendingMsgBody;
        if (target) appendSourcesPanel(target, msg.sources);
        else _pendingSources = msg.sources;
      }
      return;
    }

    // ④ token — streaming text
    if (msg.type === 'token') {
      if (!currentBubble) {
        removeTyping();
        const { body, bubble } = createAssistantMessage(pendingSource || 'rag');
        currentMsgBody = body;
        currentBubble  = bubble;
        tokenBuffer    = '';
        audioBlobCount = 0;
        // Flush any queued sources
        if (_pendingSources) {
          appendSourcesPanel(body, _pendingSources);
          _pendingSources = null;
        }
      }
      tokenBuffer += msg.text;
      currentBubble.textContent = tokenBuffer;
      scrollBottom();
      return;
    }

    // ⑤ done
    if (msg.type === 'done') {
      sendBtn.disabled = false;
      currentBubble   = null;
      currentMsgBody  = null;
      currentAudioRow = null;
      tokenBuffer     = '';
      pendingSource   = null;
      // Fade out pipeline pill after 3 s
      setTimeout(() => { pipelinePill.classList.remove('visible'); }, 3000);
      return;
    }

    // ⑥ error
    if (msg.type === 'error') {
      removeTyping();
      const { bubble } = createAssistantMessage('rag');
      bubble.textContent = '⚠ ' + msg.message;
      sendBtn.disabled = false;
    }

    scrollBottom();
  }

  // Queued metadata before first token
  let _pendingSources = null;

  // ── Pipeline pill ─────────────────────────────────────────────────────────
  function showPipelinePill(source) {
    pipelinePill.className = 'pipeline-pill visible ' + source;
    pipelinePill.textContent = source === 'cache' ? '⚡ Cache Hit' : '🔍 RAG Pipeline';
  }

  // ── DOM helpers ───────────────────────────────────────────────────────────
  function createAssistantMessage(source) {
    const wrap = document.createElement('div');
    wrap.className = 'msg assistant';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'W';

    const body = document.createElement('div');
    body.className = 'msg-body';

    // Source tag
    const tag = document.createElement('div');
    tag.className = 'msg-source-tag ' + source;
    if (source === 'cache') {
      tag.innerHTML = `<svg viewBox="0 0 10 10" fill="currentColor"><path d="M5 1l1.2 2.5L9 4.1 7 6l.5 2.8L5 7.5 2.5 8.8 3 6 1 4.1l2.8-.6z"/></svg> Cached Response`;
    } else {
      tag.innerHTML = `<svg viewBox="0 0 10 10" fill="currentColor"><circle cx="5" cy="5" r="4" stroke="currentColor" stroke-width="1.2" fill="none"/><path d="M5 3v2l1.5 1"/></svg> Live RAG`;
    }
    body.appendChild(tag);

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    body.appendChild(bubble);

    wrap.appendChild(avatar);
    wrap.appendChild(body);
    messagesEl.appendChild(wrap);
    scrollBottom();

    return { wrap, body, bubble };
  }

  function appendSourcesPanel(body, sources) {
    const panel = document.createElement('div');
    panel.className = 'sources-panel';
    panel.innerHTML = `<strong>Retrieved Sources</strong>` +
      sources.map(s =>
        `${escapeHtml(s.doc_name)} &nbsp;·&nbsp; score ${s.similarity_score}`
      ).join('<br/>');
    body.appendChild(panel);
  }

  function addAudioButton(blob, idx) {
    if (!currentMsgBody) return;
    if (!currentAudioRow) {
      currentAudioRow = document.createElement('div');
      currentAudioRow.className = 'audio-row';
      currentMsgBody.appendChild(currentAudioRow);
    }
    const btn = document.createElement('button');
    btn.className = 'play-btn';
    btn.textContent = `▶ Part ${idx}`;
    btn.onclick = () => {
      const url = URL.createObjectURL(blob);
      new Audio(url).play();
    };
    currentAudioRow.appendChild(btn);
  }

  function appendUserBubble(text) {
    const wrap = document.createElement('div');
    wrap.className = 'msg user';
    wrap.innerHTML = `
      <div class="avatar">U</div>
      <div class="msg-body"><div class="bubble">${escapeHtml(text)}</div></div>`;
    messagesEl.appendChild(wrap);
  }

  function appendTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg assistant';
    wrap.id = 'typing-indicator';
    wrap.innerHTML = `
      <div class="avatar">W</div>
      <div class="msg-body">
        <div class="bubble typing-bubble">
          <span class="tdot"></span><span class="tdot"></span><span class="tdot"></span>
        </div>
      </div>`;
    messagesEl.appendChild(wrap);
    scrollBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Send ──────────────────────────────────────────────────────────────────
  function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || sendBtn.disabled) return;
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      wsError.style.display = 'block';
      return;
    }

    appendUserBubble(text);
    appendTyping();

    // Reset state
    currentBubble   = null;
    currentMsgBody  = null;
    currentAudioRow = null;
    tokenBuffer     = '';
    audioBlobCount  = 0;
    pendingSource   = null;
    _pendingSources  = null;

    ws.send(JSON.stringify({ message: text, session_id: SESSION_ID }));

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;
    scrollBottom();
  }

  sendBtn.addEventListener('click', sendMessage);
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 110) + 'px';
  });

  // ── Boot ──────────────────────────────────────────────────────────────────
  connect();
</script>
</body>
</html>
