<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Woodsy — Furniture Advisor</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
  :root{
    --cream:#f5f0e8;
    --oak:#c8a86b;
    --walnut:#5c3d2e;
    --charcoal:#1e1a16;
    --smoke:#8c7b6b;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--charcoal);
    color:var(--cream);
    font-family:'Cormorant Garamond',serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    position:relative;
  }

  /* Grain texture overlay */
  body::before{
    content:'';
    position:fixed;
    inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events:none;
    z-index:10;
  }

  .ring{
    position:fixed;
    border-radius:50%;
    border:1px solid rgba(200,168,107,0.08);
  }
  .ring-1{width:600px;height:600px;top:50%;left:50%;transform:translate(-50%,-50%);}
  .ring-2{width:900px;height:900px;top:50%;left:50%;transform:translate(-50%,-50%);}
  .ring-3{width:1200px;height:1200px;top:50%;left:50%;transform:translate(-50%,-50%);}

  .hero{
    text-align:center;
    z-index:2;
    animation:fadeUp 1.2s cubic-bezier(.16,1,.3,1) both;
  }
  .eyebrow{
    font-family:'DM Mono',monospace;
    font-size:.65rem;
    letter-spacing:.3em;
    text-transform:uppercase;
    color:var(--oak);
    margin-bottom:2rem;
  }
  h1{
    font-size:clamp(3rem,8vw,6.5rem);
    font-weight:300;
    line-height:1.05;
    letter-spacing:-.02em;
    margin-bottom:.5rem;
  }
  h1 em{
    font-style:italic;
    color:var(--oak);
  }
  .subtitle{
    font-size:1.15rem;
    color:var(--smoke);
    font-weight:300;
    margin-bottom:3rem;
    font-style:italic;
  }
  .cta{
    display:inline-block;
    padding:.9rem 2.8rem;
    border:1px solid var(--oak);
    color:var(--oak);
    text-decoration:none;
    font-family:'DM Mono',monospace;
    font-size:.75rem;
    letter-spacing:.2em;
    text-transform:uppercase;
    transition:all .3s ease;
    position:relative;
    overflow:hidden;
  }
  .cta::before{
    content:'';
    position:absolute;
    inset:0;
    background:var(--oak);
    transform:translateX(-100%);
    transition:transform .3s ease;
    z-index:-1;
  }
  .cta:hover{color:var(--charcoal);}
  .cta:hover::before{transform:translateX(0);}

  .wood-line{
    width:60px;
    height:1px;
    background:linear-gradient(90deg,transparent,var(--oak),transparent);
    margin:2.5rem auto;
  }

  @keyframes fadeUp{
    from{opacity:0;transform:translateY(30px);}
    to{opacity:1;transform:translateY(0);}
  }
</style>
</head>
<body>
<div class="ring ring-1"></div>
<div class="ring ring-2"></div>
<div class="ring ring-3"></div>

<div class="hero">
  <p class="eyebrow">AI Furniture Advisor</p>
  <h1>Meet <em>Woodsy</em></h1>
  <div class="wood-line"></div>
  <p class="subtitle">Expert knowledge. Every grain, every joint, every question.</p>
  <a href="/chat/" class="cta">Begin Conversation</a>
</div>
</body>
</html>
